<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title> Happy Birthday 💜</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- AUTOPLAY MUSIC -->
  <audio id="bgMusic" autoplay loop muted>
    <source src="moodmode-happy-birthday-song-455067.mp3" type="audio/mpeg">
  </audio>


  <div class="background"></div>

  <div id="hearts"></div>
 
  <div class="card">

    <h1 class="title">
      Happy Birthday 
    </h1>
    
    <h1 class="Heart"> 💜 </h1>
    
    <p class="subtitle">
      Meilani Destriani Lubis
    </p>

    <p class="message">
      Semoga harimu penuh cinta, tawa,
      dan mimpi yang tercapai 💜
    </p>

    <!-- GIFT -->
    <div class="gift-wrapper">

      <div class="gift" id="gift">

        <div class="lid"></div>

        <div class="box"></div>

        <div class="ribbon"></div>

      </div>

      <p class="tap-text">
        Tap the gift 🎁
      </p>

    </div>

  </div>

<!-- POPUP -->
  <div class="popup" id="popup">

    <div class="popup-card">

      <h2>💜 보라해  💜</h2>

      <p>
        Selamat ulang tahun 🎂 <br><br>
         <div style="display:flex; justify-content:center; align-items:center; height:20vh;">
         <img src="https://media.tenor.com/dEN66mMlhB8AAAAi/i-love-you.gif" class="click-img" id="clickImg" style="width:180px;">
         </div>
        Tetap bersinar seperti bintang,
        dan semoga selalu bahagia ✨
      </p>


 
    <button id="closeBtn">Close</button>

  </div>

</div>



  <script src="script.js"></script>

</body>
</html>
